<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 8-pointed Rub el Hizb star -->
  <g transform="translate(50 50)">
    <rect x="-40" y="-40" width="80" height="80" fill="#065f46"/>
    <rect x="-40" y="-40" width="80" height="80" fill="#047857" transform="rotate(45)"/>
  </g>
  <!-- Radiating light rays -->
  <g stroke="#fbbf24" stroke-width="1.4" opacity="0.85" stroke-linecap="round">
    <line x1="50" y1="50" x2="50" y2="14"/>
    <line x1="50" y1="50" x2="50" y2="86"/>
    <line x1="50" y1="50" x2="14" y2="50"/>
    <line x1="50" y1="50" x2="86" y2="50"/>
    <line x1="50" y1="50" x2="24" y2="24"/>
    <line x1="50" y1="50" x2="76" y2="76"/>
    <line x1="50" y1="50" x2="24" y2="76"/>
    <line x1="50" y1="50" x2="76" y2="24"/>
  </g>
  <!-- Inner medallion -->
  <circle cx="50" cy="50" r="24" fill="#fef3c7" stroke="#c19a3e" stroke-width="2"/>
  <!-- Cross -->
  <rect x="47.5" y="36" width="5" height="28" fill="#065f46"/>
  <rect x="40" y="45" width="20" height="5" fill="#065f46"/>
</svg>
